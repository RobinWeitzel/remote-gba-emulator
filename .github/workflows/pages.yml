name: Deploy static PWA to GitHub Pages

# Serverless build (SPEC-SERVERLESS). Builds the static client and publishes it
# to GitHub Pages. The cross-origin isolation needed by mGBA's threaded WASM is
# provided at runtime by the coi-serviceworker COOP/COEP shim (Pages can't set
# headers). The site is served under https://<user>.github.io/<repo>/, so the
# build base is set to /<repo>/.
#
# One-time manual step (cannot be done with the default GITHUB_TOKEN): in the
# repo, Settings → Pages → Source → "GitHub Actions". After that this workflow
# deploys automatically on every push to the listed branches.

on:
  push:
    branches: [serverless, main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The Firebase web config is not a secret (§4) but is per-project and not
      # committed. Provide it as a repo Actions VARIABLE named FIREBASE_CONFIG
      # (Settings → Secrets and variables → Actions → Variables) holding the
      # JSON. If unset, the deployed app shows setup guidance instead of running.
      - name: Write firebase-config.json from repo variable (if set)
        env:
          FIREBASE_CONFIG: ${{ vars.FIREBASE_CONFIG }}
        run: |
          if [ -n "$FIREBASE_CONFIG" ]; then
            printf '%s' "$FIREBASE_CONFIG" > client/public/firebase-config.json
            echo "Wrote client/public/firebase-config.json from the FIREBASE_CONFIG variable."
          else
            echo "::warning::FIREBASE_CONFIG repo variable is not set — the deployed app will show Firebase setup guidance until you add it."
          fi

      - name: Build client (base = /<repo>/)
        run: npm --workspace client run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          GIT_SHA: ${{ github.sha }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

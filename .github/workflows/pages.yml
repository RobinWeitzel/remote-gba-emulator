name: Deploy static PWA to GitHub Pages

# Serverless build (SPEC-SERVERLESS). Builds the static client and publishes it
# to GitHub Pages. The cross-origin isolation needed by mGBA's threaded WASM is
# provided at runtime by the coi-serviceworker COOP/COEP shim (Pages can't set
# headers). The site is served under https://<user>.github.io/<repo>/, so the
# build base is set to /<repo>/.
#
# One-time manual step (cannot be done with the default GITHUB_TOKEN): in the
# repo, Settings → Pages → Source → "GitHub Actions". After that this workflow
# deploys automatically on every push to the listed branches.

on:
  push:
    branches: [serverless, main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # NOTE: the Firebase config is deliberately NOT baked into the build. Each
      # host pastes their own config in-app (kept on their device), and it travels
      # inside invite links — so a random visitor to this URL can't use (and burn
      # the quota of) anyone's Firebase project. There is no FIREBASE_CONFIG step.

      - name: Build client (base = /<repo>/)
        run: npm --workspace client run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          GIT_SHA: ${{ github.sha }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

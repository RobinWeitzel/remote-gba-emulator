name: Build & publish container image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required so the workflow can push images to ghcr.io for this repository.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets us build linux/arm64 from a linux/amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # On pull_request events we still build (to catch Dockerfile regressions)
      # but we don't authenticate or push.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Default-branch push → "latest"
            type=raw,value=latest,enable={{is_default_branch}}
            # Branch pushes → "<branchname>"
            type=ref,event=branch
            # PRs → "pr-<number>"
            type=ref,event=pr
            # Tags vX.Y.Z → semver tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Always include the short SHA
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Play-Together GBA
            org.opencontainers.image.description=Self-hosted Game Boy Advance emulator with shared family saves; WebSocket-driven sync, mobile-first.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MPL-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

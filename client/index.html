<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="robots" content="noindex" />

    <title>Play-Together GBA</title>

    <!-- Cross-origin isolation shim (SPEC §9). MUST run before anything else:
         on first load it registers a service worker that injects COOP/COEP
         response headers (GitHub Pages can't set them) and reloads the page
         once so the SW controls it — enabling `crossOriginIsolated` /
         SharedArrayBuffer for mGBA's threaded WASM. The file is served from
         /public and must NOT be bundled (it relies on being a standalone SW).

         COEP = `credentialless` (NOT require-corp): both give cross-origin
         isolation + SharedArrayBuffer, but require-corp BLOCKS Firebase RTDB's
         cross-origin traffic (the long-poll fallback fails with
         ERR_BLOCKED_BY_RESPONSE...DefaultedToSameOriginByCoep). credentialless
         lets that through (it strips credentials from no-cors cross-origin
         requests, which Firebase doesn't rely on — it auths via tokens, not
         cookies). See DECISIONS D5/D15. -->
    <script>
      window.coi = {
        coepCredentialless: () => true, // credentialless: required for Firebase RTDB
        coepDegrade: () => false,       // don't fall back to require-corp (it blocks RTDB)
        quiet: false,
      };
    </script>
    <script src="/coi-serviceworker.js"></script>

    <!-- PWA manifest. Paths are root-relative; Vite rebases them to the
         deploy base (e.g. /play-together-gba/) at build time. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c0c14" />

    <!-- iOS Safari "Add to Home Screen" niceties. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Play GBA" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Browser-tab favicon. icon.svg is sized for Android adaptive-icon
         masking (lots of safe-area padding) which looks weak at 16×16;
         favicon.svg fills the tile so the gamepad reads clearly. -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="mask-icon" href="/icons/favicon.svg" color="#2ea866" />

    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #0c0c14; color: #f1f1f7; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      #root { overscroll-behavior: none; touch-action: none; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
